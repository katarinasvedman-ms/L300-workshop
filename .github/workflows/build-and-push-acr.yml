name: Build and Push to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create .env file from secret
        run: |
          cd src
          echo "${{ secrets.ENV }}" > .env
        shell: bash

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/chat-app:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/chat-app:${{ github.sha }}
          file: ./src/Dockerfile
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/chat-app:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/chat-app:buildcache,mode=max
